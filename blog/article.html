<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章閱讀 | 海母的筆記本</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="highlight-theme">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-body text-body d-flex flex-column min-vh-100 page-fade-in">
    <div id="header-placeholder"></div>

    <main class="flex-grow-1 py-5">
        <div class="container py-4">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <a href="/blog/index.html" class="text-decoration-none text-muted mb-4 d-inline-block fw-medium">
                        <i class="bi bi-arrow-left me-1"></i> 返回文章列表
                    </a>

                    <div id="loading-spinner" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>

                    <div id="article-content" class="apple-markdown d-none"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <script src="/assets/js/main.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postName = urlParams.get('post');
            const contentDiv = document.getElementById('article-content');
            const spinnerDiv = document.getElementById('loading-spinner');

            if (!postName) {
                spinnerDiv.classList.add('d-none');
                contentDiv.classList.remove('d-none');
                contentDiv.innerHTML = `<h3 class="text-danger">未指定文章</h3><p>請從部落格列表選擇文章。</p>`;
                return;
            }

            const { markedHighlight } = window.markedHighlight;
            
            marked.use(markedHighlight({
                langPrefix: 'hljs language-',
                highlight(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                }
            }));

            marked.use(window.markedKatex({ throwOnError: false }));

            const renderer = {
                blockquote(token) {
                    const text = token.text || "";
                    const match = text.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);

                    if (match) {
                        const type = match[1].toUpperCase();
                        const config = {
                            'NOTE': { class: 'alert-note', icon: 'bi-info-circle-fill', title: '筆記 (Note)' },
                            'TIP': { class: 'alert-tip', icon: 'bi-lightbulb-fill', title: '提示 (Tip)' },
                            'IMPORTANT': { class: 'alert-important', icon: 'bi-exclamation-circle-fill', title: '重要 (Important)' },
                            'WARNING': { class: 'alert-warning', icon: 'bi-exclamation-triangle-fill', title: '警告 (Warning)' },
                            'CAUTION': { class: 'alert-caution', icon: 'bi-shield-fill-exclamation', title: '危險 (Caution)' }
                        }[type];

                        let html = this.parser.parse(token.tokens);
                        const regex = new RegExp(`^\\s*<p>\\[!${type}\\](?:<br>|\\n|\\s)*`, 'i');
                        const contentHtml = html.replace(regex, '<p>');

                        return `
                            <div class="github-alert ${config.class}">
                                <div class="alert-title"><i class="bi ${config.icon}"></i> ${config.title}</div>
                                <div class="alert-content">${contentHtml}</div>
                            </div>`;
                    }

                    const body = this.parser.parse(token.tokens);
                    return `<blockquote>\n${body}</blockquote>\n`;
                }
            };
            
            marked.use({ renderer });

            fetch(`/posts/${postName}.md`)
                .then(response => {
                    if (!response.ok) throw new Error('找不到該文章 (404)');
                    return response.text();
                })
                .then(markdownText => {
                    contentDiv.innerHTML = marked.parse(markdownText);
                    spinnerDiv.classList.add('d-none');
                    contentDiv.classList.remove('d-none');

                    const titleMatch = markdownText.match(/^#\s+(.*)/m);
                    if (titleMatch) {
                        document.title = `${titleMatch[1]} | 海母的筆記本`;
                    }
                })
                .catch(error => {
                    spinnerDiv.classList.add('d-none');
                    contentDiv.classList.remove('d-none');
                    contentDiv.innerHTML = `<h3 class="text-danger">載入失敗</h3><p>${error.message}</p>`;
                });
        });
    </script>
</body>
</html>
