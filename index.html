<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁 | 海母的筆記本</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-body text-body d-flex flex-column min-vh-100 page-fade-in">
    <div id="header-placeholder"></div>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h5 class="text-uppercase tracking-widest text-primary mb-3" data-aos="fade-up" data-aos-delay="100">Welcome to My Notebook</h5>
                    <h1 class="display-2 fw-bold mb-4 tracking-tight" data-aos="fade-up" data-aos-delay="200">
                        早安這裡是，<br><span class="text-gradient">海母的筆記本。</span>
                    </h1>
                    <p class="lead text-muted mb-5 max-w-md mx-auto" data-aos="fade-up" data-aos-delay="300">
                        我是一名想成為消防員的學生。<br>這裡記錄了我的人生經歷、技能學習，以及消防知識的筆記。
                    </p>

                    <div class="mt-5 pt-4 border-top border-translucent" data-aos="fade-up" data-aos-delay="500">
                        <div class="apple-card p-4 text-start position-relative overflow-hidden">
                            <div class="d-flex align-items-center mb-3 position-relative z-1">
                                <i class="bi bi-shield-fill-check text-primary me-2 fs-5"></i>
                                <span class="text-uppercase tracking-widest text-muted small fw-bold">EMT的101守則</span>
                            </div>
                            <div class="p-4 text-start" id="random-rule-container" data-aos="fade-up"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/animations.js"></script>
    <script src="/assets/js/rules.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", displayRandomRule);
    </script>
</body>
</html>
