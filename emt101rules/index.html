<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>EMT 101 守則 | 海母的筆記本</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-body text-body d-flex flex-column min-vh-100">
    <div id="header-placeholder"></div>
    
    <main class="flex-grow-1 py-5">
        <div class="container py-4">
            <h1 class="fw-bold mb-5">EMT 101 守則</h1>
            <p class="text-secondary mb-4 leading-relaxed">內容擷取自內政部消防署救護技術員教科書</p>
            <div id="all-rules-container"></div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/rules.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('all-rules-container');
            
            if (!container) return;
            
            const htmlContent = emtRules.map((rule, index) => `
                <div class="apple-card p-4 mb-3">
                    <blockquote class="blockquote mb-0">
                        <p class="fs-5 fw-medium text-body mb-2" style="line-height: 1.6;">${rule}</p>
                        <footer class="blockquote-footer mt-2">
                            #<cite title="Source Title">${(index + 1).toString().padStart(3, '0')}</cite>
                        </footer>
                    </blockquote>
                </div>
            `).join('');
            
            container.innerHTML = htmlContent;
        });
    </script>
</body>
</html>
